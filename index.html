<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jom Pandai Academy Battle</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animation.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<!-- MAIN APP -->

<div id="app">


<!-- MENU UTAMA -->

<section id="mainMenu" class="screen active">

<div class="logo-area">

<h1>
🚀 JOM PANDAI
<br>
<span>ACADEMY BATTLE</span>
</h1>

<p>
Belajar • Bermain • Menang
</p>

</div>


<div class="menu-buttons">

<button onclick="startMode('solo')" class="menu-btn solo">
🎮 SOLO
</button>


<button onclick="startMode('duel')" class="menu-btn duel">
⚔️ DUEL
</button>


<button onclick="startMode('squad')" class="menu-btn squad">
🔥 SQUAD BATTLE
</button>


</div>


<div class="bottom-menu">

<button onclick="openLearning()">
📚 Pembelajaran
</button>


<button onclick="openAchievement()">
🏆 Pencapaian
</button>


<button onclick="openSetting()">
⚙️ Tetapan
</button>


</div>


</section>



<!-- PILIH SUBJEK -->


<section id="subjectMenu" class="screen">


<h2>Pilih Subjek</h2>


<div class="cards">


<button onclick="selectSubject('math')">
📗 Matematik
</button>


<button onclick="selectSubject('bm')">
📘 Bahasa Melayu
</button>


<button onclick="selectSubject('english')">
📙 English
</button>


<button onclick="selectSubject('science')">
📕 Sains
</button>


</div>


</section>





<!-- PILIH DARJAH -->


<section id="gradeMenu" class="screen">


<h2>Pilih Darjah</h2>


<div class="grade-grid">


<button onclick="selectGrade(1)">
⭐ Darjah 1
</button>


<button onclick="selectGrade(2)">
⭐ Darjah 2
</button>


<button onclick="selectGrade(3)">
⭐ Darjah 3
</button>


<button onclick="selectGrade(4)">
⭐ Darjah 4
</button>


<button onclick="selectGrade(5)">
⭐ Darjah 5
</button>


<button onclick="selectGrade(6)">
⭐ Darjah 6
</button>


</div>


</section>





<!-- PILIH KATEGORI -->


<section id="categoryMenu" class="screen">


<h2>Pilih Kategori</h2>


<div id="categoryList">


</div>


</section>
