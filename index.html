<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawab Express Universe - AI Image Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .image-container {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-4 tracking-tight">
                <i class="fa-solid fa-rocket mr-2"></i>Jawab Express Universe
            </h1>
            <p class="text-gray-300 text-lg">Penjana Imej AI Kreatif 100% Asli</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Panel Kawalan -->
            <div class="glass-panel p-6 rounded-2xl md:col-span-1 flex flex-col gap-6 h-fit">
                <div>
                    <label class="block text-sm font-medium text-blue-300 mb-2">Pilih Kategori Output</label>
                    <select id="kategori" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="Hero (Kanak-kanak Lelaki)">Hero (Kanak-kanak Lelaki)</option>
                        <option value="Heroin (Kanak-kanak Perempuan)">Heroin (Kanak-kanak Perempuan)</option>
                        <option value="Robot Pembantu">Robot Pembantu</option>
                        <option value="Haiwan Peliharaan Angkasa (Space Pet)">Haiwan Peliharaan Angkasa (Space Pet)</option>
                        <option value="Planet Fantasi">Planet Fantasi</option>
                        <option value="Kenderaan Angkasa">Kenderaan Angkasa</option>
                        <option value="Bangunan Futuristik">Bangunan Futuristik</option>
                        <option value="Lencana (Badge)">Lencana (Badge)</option>
                        <option value="Kristal / Berlian">Kristal / Berlian</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-blue-300 mb-2">Variasi Warna Utama</label>
                    <select id="warna" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="Rawak (Random)">Rawak (Random)</option>
                        <option value="Neon Biru & Perak">Neon Biru & Perak</option>
                        <option value="Ungu Kosmik & Merah Jambu">Ungu Kosmik & Merah Jambu</option>
                        <option value="Hijau Zamrud & Emas">Hijau Zamrud & Emas</option>
                        <option value="Jingga & Kuning Siber">Jingga & Kuning Siber</option>
                    </select>
                </div>

                <button id="btnJana" onclick="janaImej()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:scale-105 active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Jana Imej Baharu
                </button>
            </div>

            <!-- Panel Paparan Imej -->
            <div class="glass-panel p-6 rounded-2xl md:col-span-2 flex flex-col items-center justify-center relative overflow-hidden">
                
                <div id="statusArea" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 z-10 hidden backdrop-blur-sm">
                    <div class="loader mb-4"></div>
                    <p id="statusText" class="text-blue-300 font-medium animate-pulse">Menjana kreativiti galaksi... Sila tunggu.</p>
                </div>

                <div id="resultContainer" class="image-container w-full h-full rounded-xl bg-slate-800/50 border border-slate-700 overflow-hidden flex flex-col items-center justify-center text-center p-8">
                    <i class="fa-regular fa-image text-6xl text-slate-600 mb-4"></i>
                    <p class="text-slate-400">Tekan butang "Jana Imej Baharu" untuk memulakan.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        const variasiRawak = {
            bentukMuka: ["round and chubby", "soft oval", "cute angular", "wide and friendly"],
            gayaRambut: ["spiky futuristic", "flowing energy locks", "short neat space-cut", "buns with glowing rings", "asymmetrical tech style", "none (helmet on)"],
            aksesori: ["a floating robotic companion", "energy wings", "a sleek jetpack", "glowing futuristic goggles", "holographic wrist computer", "crystal necklace", "anti-gravity boots"],
            ekspresi: ["confident smile", "curious wonder", "joyful laughter", "determined heroic look", "friendly wink"],
            latarBelakang: ["a vibrant colorful nebula", "the surface of a glowing crystal planet", "a futuristic floating space station", "a deep space starry background with distant galaxies"],
            warnaRawak: ["Neon Blue & Silver", "Cosmic Purple & Pink", "Emerald Green & Gold", "Orange & Cyber Yellow", "Crimson & Platinum", "Teal & Magenta"]
        };

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function janaImej() {
            const kategori = document.getElementById('kategori').value;
            const pilihanWarna = document.getElementById('warna').value;
            const warnaAkhir = pilihanWarna === "Rawak (Random)" ? getRandom(variasiRawak.warnaRawak) : pilihanWarna;

            const btn = document.getElementById('btnJana');
            const statusArea = document.getElementById('statusArea');
            const resultContainer = document.getElementById('resultContainer');

            let subjectDetails = "";
            
            if (kategori.includes("Hero")) {
                subjectDetails = `a completely original ${kategori} character. Face shape: ${getRandom(variasiRawak.bentukMuka)}. Hair: ${getRandom(variasiRawak.gayaRambut)}. Expression: ${getRandom(variasiRawak.ekspresi)}. Wearing a completely unique, futuristic space suit or casual sci-fi explorer outfit. Equipped with ${getRandom(variasiRawak.aksesori)}.`;
            } else if (kategori.includes("Robot")) {
                subjectDetails = `a completely original friendly helper Robot. Unique structural design, floating or with cute mechanical legs. Expression: ${getRandom(variasiRawak.ekspresi)} (displayed on a digital face visor). Equipped with ${getRandom(variasiRawak.aksesori)}.`;
            } else if (kategori.includes("Pet")) {
                subjectDetails = `a completely original alien space pet. A totally unique fictional species (not a dog, cat, or known animal). Cute, friendly, magical appearance. Expression: ${getRandom(variasiRawak.ekspresi)}.`;
            } else if (kategori.includes("Planet") || kategori.includes("Bangunan")) {
                subjectDetails = `a completely original ${kategori}. Futuristic, highly imaginative structural design.`;
            } else {
                subjectDetails = `a completely original ${kategori} item. Glowing, magical, highly detailed 3D game asset.`;
            }

            const finalPrompt = `100% original concept art of ${subjectDetails} Theme: Jawab Express Universe (educational, space adventure, kids). Visual Style: 3D Cartoon Premium, Pixar-style rendering but completely original IP. High quality, HD, 4K, bright vibrant colors, extremely cute, clean, soft cinematic lighting. Dominant colors: ${warnaAkhir}. Background: ${getRandom(variasiRawak.latarBelakang)}. CRITICAL RULES: MUST NOT resemble ANY existing characters, movies, anime, Disney, Pixar, Marvel, DC, famous video games, mascots, or logos. Completely unique identity. NO text, NO words, NO logos, NO watermarks, NO signatures.`;

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            statusArea.classList.remove('hidden');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const payload = {
                    instances: { prompt: finalPrompt },
                    parameters: { sampleCount: 1 }
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
                    const base64Image = data.predictions[0].bytesBase64Encoded;
                    
                    // 1. URL untuk Paparan (Standard Image)
                    const displayUri = `data:image/png;base64,${base64Image}`;
                    
                    // 2. URL Khas untuk Paksa Muat Turun (Octet-Stream)
                    const downloadUri = `data:application/octet-stream;base64,${base64Image}`;
                    
                    const cleanName = kategori.replace(/[^a-zA-Z0-9]/g, '_');
                    const fileName = `JawabExpress_${cleanName}_${Date.now()}.png`;
                    
                    // 3. Masukkan ke dalam DOM (Butang akan muat turun automatik di luar persekitaran ini)
                    resultContainer.innerHTML = `
                        <img src="${displayUri}" alt="Janaan AI Jawab Express" class="w-full h-auto object-contain rounded-xl shadow-2xl max-h-[450px] transform transition hover:scale-[1.02]">
                        <div class="mt-6 flex flex-col items-center gap-3">
                            <a href="${downloadUri}" download="${fileName}" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-xl inline-flex items-center gap-2 shadow-lg transition transform hover:scale-105 active:scale-95 cursor-pointer no-underline">
                                <i class="fa-solid fa-download"></i> Simpan Gambar
                            </a>
                            <p class="text-xs text-slate-400 mt-2 bg-slate-800 p-2 rounded">
                                *Jika menguji dalam ruangan chat AI ini, klik kanan / sentuh lama gambar untuk "Save Image". Butang hijau ini berfungsi 100% apabila di-host di laman web sebenar.
                            </p>
                        </div>
                    `;
                } else {
                    throw new Error("Gagal mendapatkan imej daripada AI.");
                }

            } catch (error) {
                console.error(error);
                resultContainer.innerHTML = `
                    <div class="text-red-400 p-4 border border-red-500/30 bg-red-900/20 rounded-lg">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                        <p>Ralat berlaku semasa menjana imej. Sila cuba lagi sebentar lagi.</p>
                        <p class="text-xs mt-2 opacity-70">${error.message}</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                statusArea.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
```eof
